appId: com.heima.accounting
productName: 黑马记账
asar: false
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - node_modules/**/*
  - package.json
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
mac:
  target:
    - dmg
  artifactName: ${productName}-${version}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: 黑马记账
